name: flashcards_app
description: Simple cross-platform flashcards demo (web + mobile/desktop)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"   # <-- recommend 3.4+ to satisfy latest packages

dependencies:
  flutter:
    sdk: flutter
  flip_card: ^0.7.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  shared_preferences: ^2.3.2
  share_plus: ^10.0.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
